version: '3.8'

services:
  stationarr:
    build: .
    container_name: stationarr
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    restart: unless-stopped
    networks:
      - plex-network
    labels:
      - "com.docker.compose.project=stationarr"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:3000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  plex-network:
    driver: bridge

